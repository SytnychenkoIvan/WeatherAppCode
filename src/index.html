<!DOCTYPE html>
<html lang="en">
@@include('html/head.html',{
"title":"Weather App"
})

<body>
	<div class="card">
		<h1 class="card__title">Weather App</h1>
		<p class="card__date">Today,<span id="date"></span></p>
		<div class="card__search">
			<input type="text" class="card__input" placeholder="Enter city name">
			<button id="searchBtn" class="card__btn">
				<i class="fa-solid fa-magnifying-glass"></i>
			</button>
		</div>
		<div class="card__weather">
			<h2 class="card__title card__title--city">Kyiv</h2>
			<div class="card__block">
				<h3 class="card__title card__title--temp">22°C</h3>
				<img src="" class="card__weather-icon" alt="Icon">
			</div>
		</div>
		<div class="card__details">
			<div class="card__col">
				<i class="fa-solid fa-wind"></i>
				<p>Wind</p>
				<p id="wind" class="card__info">15m/s</p>
			</div>
			<div class="card__col">
				<i class="fa-solid fa-droplet"></i>
				<p>Hum</p>
				<p id="humidity" class="card__info">50%</p>
			</div>
		</div>
	</div>
	<script src="js/app.min.js"></script>
</body>

</html>
